<!DOCTYPE html>
<html lang="es">

<head>
    <title>Tienda de Moda</title>
    <meta charset="utf-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<!--
    El body comienza con clase "bg-light" para tener fondo claro por defecto.
    El modo oscuro se activa dinámicamente en main.js cambiando clases y estilos.
-->

<body class="bg-light">

    <div class="container-fluid">
        <div class="row align-items-center py-2">
            <div class="col">
                <h1 class="display-1 text-center text-dark">Tienda de Moda</h1>
            </div>
            <!--
                    CRITERIO 6c: Botón "Cambiar Tema".
                    Al hacer clic ejecuta cambiarTema() en main.js.
                    El texto se actualiza entre "Modo Oscuro" y "Modo Claro".
                -->
            <div class="col-auto">
                <button id="btnTema" onclick="cambiarTema()" class="btn btn-secondary">Modo Oscuro</button>
            </div>
        </div>
    </div>

    <!-- CRITERIO 4 (20%): Formulario para agregar prendas -->
    <div class="container">

        <!--
            CRITERIO 4e: Mensaje de error visible en rojo cuando la validación falla.
            Se oculta inicialmente con display:none y main.js lo muestra/oculta.
        -->
        <div id="mensajeError" class="alert alert-danger" role="alert" style="display:none;">
            <strong>Error:</strong> <span id="textoError"></span>
        </div>

        <form name="frmventa">
            <div class="d-flex justify-content-center align-items-center gap-3 flex-wrap">

                <!-- Campo Nombre -->
                <div>
                    <label class="form-label">Producto</label>
                    <!--
                        CRITERIO 4a: Este campo recibe el nombre de la prenda.
                        El valor se lee en main.js por id="txtproducto" y se valida
                        con regex para permitir solo letras, espacios y tildes.
                    -->
                    <input type="text" id="txtproducto" placeholder="Ej. Blusa floral" class="form-control">
                </div>

                <!-- Campo Precio -->
                <div>
                    <label class="form-label">Precio Unitario ($)</label>
                    <!--
                        CRITERIO 4a: Campo precio.
                        Aunque HTML permite type="number", usamos type="text"
                        para validar con expresiones regulares en main.js.
                    -->
                    <input type="text" id="txtprecio" placeholder="0.00" class="form-control">
                </div>

                <!-- Campo Cantidad -->
                <div>
                    <label class="form-label">Cantidad</label>
                    <!--
                        CRITERIO 4a: Campo cantidad.
                        main.js valida que sea un número entero mayor a cero.
                    -->
                    <input type="text" id="txtcantidad" placeholder="0" class="form-control">
                </div>

                <!-- Campo Imagen -->
                <div>
                    <label class="form-label">Foto de la prenda</label>
                    <!--
                        CRITERIO 4b: Input de archivo que acepta solo imágenes.
                        El archivo se transforma a data URL en main.js para mostrarse
                        directamente en la tabla sin subirlo a un servidor.
                    -->
                    <input type="file" id="txtimagen" accept="image/*" class="form-control">
                </div>

                <!-- Botón Agregar Prenda -->
                <div class="align-self-end">
                    <!--
                        type="button" evita que el formulario recargue la página.
                        La función agregarProducto() maneja la lectura, validación,
                        creación del objeto Producto y actualización del DOM.
                    -->
                    <button type="button" onclick="agregarProducto()" class="btn btn-primary">Agregar Prenda</button>
                </div>

            </div>
        </form>
    </div>

    <!--
        CRITERIO 5 (20%): Tabla dinámica para mostrar la lista de prendas.
        La cabecera define las columnas y el cuerpo <tbody> se completa desde main.js.
    -->

    <table id="tablaProductos" class="table table-bordered mt-4">
        <thead class="table-dark">
            <tr>
                <th>Foto</th>
                <th>Producto</th>
                <th>Descripción</th>
                <th>Precio Unitario</th>
                <th>Cantidad</th>
                <th>Total</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="detallevendedores"></tbody>
          <!-- Aquí main.js inyecta las filas con la información de cada producto -->
    </table>
    
    <!--
        CRITERIO 5d: Párrafo que muestra el valor total del inventario.
        El texto completo y el valor numérico se actualizan desde main.js.
        Si el inventario está vacío, el total se mantiene en 0.00.
        Si el valor supera $500, el estilo cambia para destacarlo.
    -->
    <p id="parrafoTotal" class="fs-5 ms-2">
        Valor total del inventario: $<span id="total">0.00</span>
    </p>
    
    <!-- Botón de utilidad para vaciar el inventario en pantalla -->
    <button onclick="eliminarTodos()" class="btn btn-danger ms-2 mb-3">Eliminar Todos</button>
    
    <!--
        CRITERIO 1 (10%): Cargamos los scripts en el orden correcto al final.
        Producto.js define la clase Producto, Inventario.js define Inventario,
        main.js usa ambas para manejar la interfaz y la lógica.
    -->
    <script src="js/Producto.js"></script>
    <script src="js/Inventario.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
